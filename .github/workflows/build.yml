name: Build and Push Docker Image
on:
  push:
    branches: [main]

jobs:
  build-runpod:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'Dockerfile') ||
      contains(github.event.head_commit.added, 'Dockerfile') ||
      contains(github.event.head_commit.modified, 'start_script.sh') ||
      contains(github.event.head_commit.modified, 'vxfun_init.py') ||
      contains(github.event.head_commit.modified, 'sitecustomize.py') ||
      contains(github.event.head_commit.modified, 'log_forwarder.py') ||
      contains(github.event.head_commit.modified, 'extra_model_paths.yaml')
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-serverless:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/comfyui-serverless:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/comfyui-serverless:buildcache,mode=max

  build-vast:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'Dockerfile.vast') ||
      contains(github.event.head_commit.added, 'Dockerfile.vast') ||
      contains(github.event.head_commit.modified, 'vast_server.py') ||
      contains(github.event.head_commit.added, 'vast_server.py') ||
      contains(github.event.head_commit.modified, 'start_vast.sh') ||
      contains(github.event.head_commit.added, 'start_vast.sh') ||
      contains(github.event.head_commit.modified, 'vxfun_init.py') ||
      contains(github.event.head_commit.modified, 'sitecustomize.py') ||
      contains(github.event.head_commit.modified, 'log_forwarder.py') ||
      contains(github.event.head_commit.modified, 'extra_model_paths.yaml')
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.vast
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-vast:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/comfyui-vast:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/comfyui-vast:buildcache,mode=max
